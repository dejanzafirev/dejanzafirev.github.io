{% include base_path %}
<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="no-greedy-nav">
        <ul class="visible-links">

  <!-- Site name (left) -->
  <li class="masthead__menu-item masthead__menu-item--lg site-title">
    <span>{{ site.title }}</span>
  </li>

  <!-- Nav links (close to the name) -->
  {% for link in site.data.navigation.main %}
    {% if link.url contains 'http' %}
      {% assign domain = '' %}
    {% else %}
      {% assign domain = base_path %}
    {% endif %}
    <li class="masthead__menu-item nav-link">
      <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
    </li>
  {% endfor %}

  <!-- Push everything after this to the far right -->
  <li class="masthead__menu-item nav-right">
    <a href="https://www.uni.li/en/dejan.zafirev"
       target="_blank" rel="noopener"
       class="academic-button">
      Academic Profile
    </a>
  </li>

  <li id="theme-toggle" class="masthead__menu-item">
    <a role="button" aria-labelledby="theme-icon">
      <i id="theme-icon" class="fas fa-sun" aria-hidden="true" title="toggle theme"></i>
    </a>
  </li>

</ul>
      </nav>
    </div>
  </div>
</div>
