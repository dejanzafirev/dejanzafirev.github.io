<!-- <a href="/sitemap/">Sitemap</a> -->
<script>
  // Default to dark unless user already chose a theme
  const saved = localStorage.getItem("theme");
  if (!saved) localStorage.setItem("theme", "dark");
</script>
<!-- Support for MathJax — only load when page contains math -->
<script>
  if (document.querySelector('.MathJax, mjx-container, [class*="math"], script[type="math/tex"]') ||
      document.body.textContent.indexOf('\\(') !== -1 ||
      document.body.textContent.indexOf('$$') !== -1) {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
    s.id = 'MathJax-script';
    s.defer = true;
    document.head.appendChild(s);
  }
</script>

<!-- Support for Mermaid — only load when page contains mermaid diagrams -->
<script type="module">
    if (document.querySelector('code.language-mermaid')) {
        const { default: mermaid } = await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
        mermaid.initialize({startOnLoad:true, theme:'default'});
        await mermaid.run({querySelector:'code.language-mermaid'});
    }
</script>

<!-- end custom footer snippets -->
