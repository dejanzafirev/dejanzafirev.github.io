<!-- start custom footer snippets -->

<!-- <a href="/sitemap/">Sitemap</a> -->
{% if page.mathjax %}
<!-- MathJax — opt-in per page via `mathjax: true` in front matter -->
<script id="MathJax-script" defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{% endif %}

<!-- Prefetch internal links on hover for instant navigation -->
<script src="https://cdn.jsdelivr.net/npm/instant.page@5.2.0/instantpage.min.js" type="module" defer></script>

<!-- Support for Mermaid — only load when page contains mermaid diagrams -->
<script type="module">
    if (document.querySelector('code.language-mermaid')) {
        const { default: mermaid } = await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
        mermaid.initialize({startOnLoad:true, theme:'default'});
        await mermaid.run({querySelector:'code.language-mermaid'});
    }
</script>

<!-- end custom footer snippets -->
