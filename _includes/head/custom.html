{% include base_path %}

<!-- start custom head snippets -->

<!-- Apply dark theme before page renders to prevent white flash -->
<script>
  (function() {
    var t = localStorage.getItem("theme") || "light";
    if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
  })();
</script>

{% if page.mathjax or page.mermaid %}
<!-- Pre-warm DNS/TLS only on pages that opt into CDN-rendered extras -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
{% endif %}

<!-- Icons are inlined as SVG masks in custom.css — no Font Awesome / Academicons CDN -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/custom.css">
<meta name="theme-color" content="#ffffff"/>

<!-- end custom head snippets -->
