name: Manual site update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Update and build site
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install npm dependencies
      run: npm install

    - name: Build JS assets
      run: npm run build:js

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'

    - name: Install bundler and gems
      run: gem install bundler && bundle install --jobs 4 --retry 3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Update CV JSON
      run: |
        python3 scripts/cv_markdown_to_json.py --input _pages/cv.md --output _data/cv.json --config _config.yml

    - name: Build Jekyll site
      env:
        JEKYLL_ENV: production
      run: bundle exec jekyll build --config _config.yml

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add _data/cv.json || true
        git add assets/js/main.min.js || true
        git commit -m "Automated site update" || echo "No changes to commit"
        git push
